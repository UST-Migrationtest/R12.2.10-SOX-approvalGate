name: PROD Deployment — SOX Approval Gate

on:
  push:
    branches: [ main ]
    paths:
      - 'modules/**'
      - 'MANIFEST.txt'
      - '.github/workflows/prod-deployment-sox.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_env:
        description: Deployment target environment
        required: true
        default: UAT
        type: choice
        options: [DEV, UAT, PROD]
      deployment_id:
        description: Deployment reference ID
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  deployments: write

env:
  SOX_AUDIT_RETENTION_DAYS: 2555

jobs:
  validate-approvals:
    name: SOX Gate 1 | PR Approval Count >= 2
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      approval_count: ${{ steps.result.outputs.count }}
      approvers: ${{ steps.result.outputs.approvers }}
    steps:
      - uses: actions/checkout@v4
      - id: result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          REVIEWS=$(gh api repos/$REPO/pulls/$PR_NUM/reviews --jq '[.[] | select(.state=='APPROVED')] | length')
          echo "count=$REVIEWS" >> $GITHUB_OUTPUT
          echo "approvers=[pr-approvers]" >> $GITHUB_OUTPUT
      - run: |
          COUNT=${{ steps.result.outputs.count }} 
          [ "$COUNT" -ge 2 ] || (echo "Insufficient approvals" && exit 1)

  validate-manifest:
    name: SOX Gate 2 | Validate Deployment Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          [ -f MANIFEST.txt ] || exit 1
          grep -q "^DEPLOYMENT_ID:" MANIFEST.txt || exit 1
          grep -q "^TARGET_ENV:" MANIFEST.txt || exit 1

  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: [validate-approvals, validate-manifest]
    environment:
      name: UAT
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploying to UAT"

  deploy-prod:
    name: Deploy to PROD (Requires Named Approvers)
    runs-on: ubuntu-latest
    needs: [validate-approvals, validate-manifest, deploy-uat]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'PROD'
    environment:
      name: PROD
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploying to PROD"

  generate-audit-record:
    name: SOX | Generate Audit Record
    runs-on: ubuntu-latest
    if: always()
    needs: [validate-approvals, validate-manifest]
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/generate_sox_audit_log.sh --output reports/audit.json
      - uses: actions/upload-artifact@v4
        with:
          name: sox-audit-log-${{ github.run_id }}
          path: reports/audit.json
          retention-days: ${{ env.SOX_AUDIT_RETENTION_DAYS }}
